<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Danica Books – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
  <!-- Netlify CMS (GitHub backenddel is működik) -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

  <script>
    // GitHub OAuth App beállítása
    window.CMS_MANUAL_INIT = true;

    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "danica-books/danica-books",
          branch: "main",
          auth_type: "implicit",
          app_id: "Ov23livR0rVgO4SeyLkX"
        },
        media_folder: "images",
        public_folder: "/danica-books/images"
      }
    });
  </script>
</body>
</html>
